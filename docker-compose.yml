services:
  php:
    build:
      context: .
      dockerfile: docker/PHP.DockerFile
    volumes:
      - ./:/app
    networks:
      - app-network
    depends_on:
      - postgres

  nginx:
    image: nginx:stable
    ports:
      - "80:80"
    volumes:
      - ./:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - php

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: loans
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:

volumes:
  pgdata: